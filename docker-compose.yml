x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/home/nanobot/.nanobot
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    # Do not publish host ports here to avoid conflicts with existing proxies.
    # Instead, rely on your existing reverse-proxy (Traefik) to route
    # bot.kapturo.fr -> nanobot-gateway:18790. Traefik will pick up these
    # Docker labels when the service is (re)created.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nanobot.rule=Host(`bot.kapturo.fr`)"
      - "traefik.http.services.nanobot.loadbalancer.server.port=18790"
      - "traefik.http.routers.nanobot.entrypoints=websecure"
      - "traefik.http.routers.nanobot.tls=true"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-api:
    container_name: nanobot-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

# No reverse-proxy service in this compose file to avoid binding host ports
# that are already in use. Use your existing proxy (Traefik) to route
# bot.kapturo.fr to the `nanobot-gateway` service.
